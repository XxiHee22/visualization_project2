<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 疫情数据可视化分析系统</title>
  <link rel="stylesheet" href="./css/navigation.css">
  <link rel="stylesheet" href="./css/style.css">
  
  <!-- CDN引用第三方库 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://d3js.org/topojson.v3.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <!-- ECharts库用于中国地图 -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <!-- 左侧导航栏 -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <h2>COVID-19<br>可视化系统</h2>
    </div>
    <ul class="nav-menu">
      <li class="nav-item active">
        <a href="index.html" class="nav-link">
          <span class="nav-icon">📊</span>
          <span class="nav-text">可视化图表</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="documentation.html" class="nav-link">
          <span class="nav-icon">📖</span>
          <span class="nav-text">说明文档</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- 主内容区域 -->
  <div class="main-content">
    <!-- 加载指示器 -->
    <div id="loading-indicator" class="loading-indicator">
    <div class="spinner"></div>
    <p>正在加载数据...</p>
  </div>

  <!-- 错误提示容器 -->
  <div id="error-container" class="error-container" style="display: none;"></div>

  <!-- 主容器 -->
  <div class="container">
    <!-- 标题 -->
    <header class="header">
      <h1>COVID-19 疫情数据可视化分析系统</h1>
      <p class="subtitle">基于多维度数据的全球及区域疫情态势研究</p>
    </header>

    <!-- 美国地图可视化 -->
    <section class="chart-section">
      <h2>全球疫情地理分布图</h2>
      <p class="chart-description">通过交互式地图展示各国家/地区病例分布情况</p>
      <div id="us-map-container" class="chart-container"></div>
    </section>

    <!-- 国家排名柱状图 -->
    <section class="chart-section">
      <h2>全球疫情数据统计排名</h2>
      <div class="controls">
        <label for="metric-selector">数据指标：</label>
        <select id="metric-selector" class="metric-selector">
          <option value="confirmed">累计确诊病例</option>
          <option value="deaths">累计死亡病例</option>
          <option value="recovered">累计治愈病例</option>
        </select>
      </div>
      <div id="country-ranking-container" class="chart-container"></div>
    </section>

    <!-- 中国省份时间序列折线图 -->
    <section class="chart-section">
      <h2>中国各省份治愈病例时序分析</h2>
      <div class="controls">
        <label for="province-filter">省份筛选：</label>
        <select id="province-filter" class="province-filter" multiple size="5">
          <!-- 动态填充省份选项 -->
        </select>
        <p class="hint">按住Ctrl/Cmd键可选择多个省份</p>
      </div>
      <div id="china-timeline-container" class="chart-container"></div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
      <p>数据来源：COVID-19 公开数据集 | 数据可视化研究项目</p>
    </footer>
  </div>

    <!-- Tooltip容器 -->
    <div id="tooltip" class="tooltip" style="display: none;"></div>
  </div>

  <!-- 主应用脚本 -->
  <script type="module" src="./js/main.js?v=7"></script>
</body>
</html>
